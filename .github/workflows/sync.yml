name: Daily Sync

on:
  schedule:
    - cron: '0 18 * * *' # 매일 KST 03:00 (UTC 18:00)
  workflow_dispatch: # 수동 트리거

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.SYNC_URL }}/admin/sync" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}")

          echo "Response: $response"

          if [ "$response" != "200" ]; then
            echo "Sync failed with status $response"
            exit 1
          fi
