<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - who-tech-course</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #333; }
      .container { max-width: 720px; margin: 40px auto; padding: 0 20px; }
      h1 { font-size: 20px; margin-bottom: 24px; }
      .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; border: 1px solid #e0e0e0; }
      .card h2 { font-size: 14px; color: #666; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
      .stat { font-size: 28px; font-weight: bold; }
      .sub { font-size: 13px; color: #999; margin-top: 4px; }
      input, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; margin-bottom: 8px; font-family: monospace; }
      button { padding: 8px 16px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
      .btn-primary { background: #0070f3; color: #fff; }
      .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
      .btn-danger { background: #e53e3e; color: #fff; font-size: 12px; padding: 4px 10px; }
      .btn-sm { font-size: 12px; padding: 4px 10px; background: #f0f0f0; }
      #login { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
      #login .box { background: #fff; padding: 32px; border-radius: 8px; width: 320px; }
      #login h2 { margin-bottom: 16px; }
      #toast { position: fixed; bottom: 24px; right: 24px; background: #333; color: #fff; padding: 10px 16px; border-radius: 6px; font-size: 14px; display: none; }
      .repo-list { margin-bottom: 12px; }
      .repo-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
      .repo-item:last-child { border-bottom: none; }
      .repo-name { font-weight: bold; flex: 1; }
      .repo-regex { font-size: 12px; color: #999; font-family: monospace; flex: 2; }
      .repo-add { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
      .repo-add input { margin-bottom: 0; }
      label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th { text-align: left; padding: 6px 8px; border-bottom: 2px solid #eee; color: #666; font-weight: 600; }
      td { padding: 6px 8px; border-bottom: 1px solid #f5f5f5; vertical-align: top; }
      tr:last-child td { border-bottom: none; }
      .tag { display: inline-block; font-size: 11px; padding: 2px 6px; border-radius: 3px; background: #f0f0f0; color: #555; }
      .tag.frontend { background: #e0f0ff; color: #0057b3; }
      .tag.backend { background: #e6f4ea; color: #2d6a3f; }
      .tag.android { background: #fef3e0; color: #b36000; }
      details summary { cursor: pointer; font-size: 14px; color: #0070f3; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <div id="login">
      <div class="box">
        <h2>Admin 로그인</h2>
        <input type="password" id="secret-input" placeholder="ADMIN_SECRET" />
        <button class="btn-primary" onclick="login()" style="width:100%">로그인</button>
      </div>
    </div>

    <div class="container" id="main" style="display:none">
      <h1>who-tech-course 어드민</h1>

      <div class="card">
        <h2>수집 현황</h2>
        <div style="display:flex;gap:32px;margin-bottom:8px">
          <div>
            <div class="stat" id="member-count">-</div>
            <div class="sub">수집된 멤버 수</div>
          </div>
          <div>
            <div class="stat" id="repo-count">-</div>
            <div class="sub">등록된 레포 수</div>
          </div>
        </div>
        <div class="sub" id="last-sync">마지막 sync: -</div>
      </div>

      <div class="card">
        <h2>수동 Sync</h2>
        <p style="font-size:13px;color:#666;margin-bottom:12px">등록된 미션 레포 전체 PR을 수집합니다.</p>
        <button class="btn-primary" id="sync-btn" onclick="triggerSync()">Sync 실행</button>
        <div id="sync-result" style="margin-top:8px;font-size:13px;color:#666"></div>
      </div>

      <div class="card">
        <h2>미션 레포 관리</h2>
        <div class="repo-list" id="repo-list"></div>
        <div style="border-top:1px solid #eee;padding-top:12px">
          <label>레포 추가</label>
          <div class="repo-add">
            <input type="text" id="repo-name" placeholder="레포 이름 (예: javascript-lotto)" />
            <input type="text" id="repo-url" placeholder="URL (예: https://github.com/woowacourse/...)" />
          </div>
          <div class="repo-add">
            <select id="repo-track" style="padding:8px 10px;border:1px solid #ddd;border-radius:4px;font-size:14px">
              <option value="frontend">frontend</option>
              <option value="backend">backend</option>
              <option value="android">android</option>
            </select>
            <select id="repo-type" style="padding:8px 10px;border:1px solid #ddd;border-radius:4px;font-size:14px">
              <option value="individual">individual</option>
              <option value="integration">integration</option>
            </select>
          </div>
          <input type="text" id="repo-regex" placeholder="닉네임 정규식 (비우면 Workspace 기본값 사용)" />
          <button class="btn-primary" onclick="addRepo()">추가</button>
        </div>
      </div>

      <div class="card">
        <h2>멤버 DB</h2>
        <div id="member-table"><span style="font-size:13px;color:#999">불러오는 중...</span></div>
      </div>

      <div class="card">
        <h2>Workspace 설정</h2>
        <label>닉네임 정규식 (기본값)</label>
        <input type="text" id="nickname-regex" />
        <label>기수 규칙 (JSON)</label>
        <textarea id="cohort-rules" rows="4"></textarea>
        <button class="btn-primary" onclick="saveWorkspace()">저장</button>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      let token = '';

      function login() {
        token = document.getElementById('secret-input').value;
        fetch('/admin/status', { headers: { Authorization: `Bearer ${token}` } })
          .then(r => {
            if (r.ok) {
              document.getElementById('login').style.display = 'none';
              document.getElementById('main').style.display = 'block';
              loadStatus();
              loadWorkspace();
              loadRepos();
              loadMembers();
            } else {
              alert('잘못된 비밀키입니다.');
            }
          });
      }

      function loadStatus() {
        fetch('/admin/status', { headers: { Authorization: `Bearer ${token}` } })
          .then(r => r.json())
          .then(data => {
            document.getElementById('member-count').textContent = data.memberCount;
            document.getElementById('repo-count').textContent = data.repoCount;
            document.getElementById('last-sync').textContent =
              '마지막 sync: ' + (data.lastSyncAt ? new Date(data.lastSyncAt).toLocaleString('ko-KR') : '없음');
          });
      }

      function loadWorkspace() {
        fetch('/admin/workspace', { headers: { Authorization: `Bearer ${token}` } })
          .then(r => r.json())
          .then(data => {
            document.getElementById('nickname-regex').value = data.nicknameRegex;
            document.getElementById('cohort-rules').value = JSON.stringify(data.cohortRules, null, 2);
          });
      }

      function loadRepos() {
        fetch('/admin/repos', { headers: { Authorization: `Bearer ${token}` } })
          .then(r => r.json())
          .then(repos => {
            const list = document.getElementById('repo-list');
            if (repos.length === 0) {
              list.innerHTML = '<div style="font-size:13px;color:#999">등록된 레포가 없습니다.</div>';
              return;
            }
            list.innerHTML = repos.map(repo => `
              <div class="repo-item">
                <span class="repo-name">${repo.name}</span>
                <span class="repo-regex">${repo.track} · ${repo.type}</span>
                <span class="repo-regex">${repo.nicknameRegex ?? '기본 정규식'}</span>
                <button class="btn-sm" onclick="syncRepo(${repo.id}, this)">Sync</button>
                <button class="btn-sm" onclick="editRepoRegex(${repo.id}, ${JSON.stringify(repo.nicknameRegex ?? '')})">수정</button>
                <button class="btn-danger" onclick="deleteRepo(${repo.id})">삭제</button>
              </div>
            `).join('');
          });
      }

      function addRepo() {
        const name = document.getElementById('repo-name').value.trim();
        const repoUrl = document.getElementById('repo-url').value.trim();
        const track = document.getElementById('repo-track').value;
        const type = document.getElementById('repo-type').value;
        const nicknameRegex = document.getElementById('repo-regex').value.trim() || null;

        if (!name || !repoUrl) { alert('레포 이름과 URL을 입력하세요.'); return; }

        fetch('/admin/repos', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, repoUrl, track, type, nicknameRegex }),
        })
          .then(r => { if (!r.ok) throw new Error(); return r.json(); })
          .then(() => {
            document.getElementById('repo-name').value = '';
            document.getElementById('repo-url').value = '';
            document.getElementById('repo-regex').value = '';
            loadRepos();
            toast(`${name} 추가됨`);
          })
          .catch(() => alert('이미 존재하거나 오류가 발생했습니다.'));
      }

      function syncRepo(id, btn) {
        btn.disabled = true;
        btn.textContent = '...';
        fetch(`/admin/repos/${id}/sync`, { method: 'POST', headers: { Authorization: `Bearer ${token}` } })
          .then(r => r.json())
          .then(data => {
            loadStatus();
            loadMembers();
            toast(`${data.synced}건 수집됨`);
          })
          .catch(() => toast('Sync 실패'))
          .finally(() => { btn.disabled = false; btn.textContent = 'Sync'; });
      }

      function editRepoRegex(id, current) {
        const regex = prompt('닉네임 정규식 (비우면 기본값 사용):', current);
        if (regex === null) return;

        fetch(`/admin/repos/${id}`, {
          method: 'PATCH',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ nicknameRegex: regex || null }),
        })
          .then(() => { loadRepos(); toast('수정됐어요'); });
      }

      function deleteRepo(id) {
        if (!confirm('삭제하면 관련 수집 데이터도 모두 삭제됩니다. 계속할까요?')) return;

        fetch(`/admin/repos/${id}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` },
        })
          .then(() => { loadRepos(); toast('삭제됐어요'); });
      }

      function triggerSync() {
        const btn = document.getElementById('sync-btn');
        const result = document.getElementById('sync-result');
        btn.disabled = true;
        btn.textContent = 'Sync 중...';
        result.textContent = '';

        fetch('/admin/sync', { method: 'POST', headers: { Authorization: `Bearer ${token}` } })
          .then(r => r.json())
          .then(data => {
            result.textContent = `완료: ${data.reposSynced}개 레포, ${data.totalSynced}건 수집됨`;
            loadStatus();
            loadMembers();
            toast(`${data.totalSynced}건 수집 완료`);
          })
          .catch(() => { result.textContent = '오류가 발생했습니다.'; })
          .finally(() => { btn.disabled = false; btn.textContent = 'Sync 실행'; });
      }

      function saveWorkspace() {
        const nicknameRegex = document.getElementById('nickname-regex').value;
        let cohortRules;
        try {
          cohortRules = JSON.parse(document.getElementById('cohort-rules').value);
        } catch {
          alert('기수 규칙 JSON 형식이 올바르지 않습니다.');
          return;
        }

        fetch('/admin/workspace', {
          method: 'PUT',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ nicknameRegex, cohortRules }),
        })
          .then(r => r.json())
          .then(() => toast('저장됐어요'));
      }

      function loadMembers() {
        fetch('/admin/members', { headers: { Authorization: `Bearer ${token}` } })
          .then(r => r.json())
          .then(members => {
            const el = document.getElementById('member-table');
            if (members.length === 0) {
              el.innerHTML = '<div style="font-size:13px;color:#999">수집된 멤버가 없습니다.</div>';
              return;
            }
            el.innerHTML = `
              <table>
                <thead>
                  <tr>
                    <th>GitHub ID</th>
                    <th>닉네임</th>
                    <th>기수</th>
                    <th>제출</th>
                    <th>블로그</th>
                    <th>최근 글</th>
                  </tr>
                </thead>
                <tbody>
                  ${members.map(m => `
                    <tr>
                      <td><a href="https://github.com/${m.githubId}" target="_blank">${m.githubId}</a></td>
                      <td>${m.nickname ?? '-'}</td>
                      <td>${m.cohort ?? '-'}기</td>
                      <td>${m._count.submissions}건</td>
                      <td>${m.blog ? `<a href="${m.blog}" target="_blank" style="font-size:12px">링크</a>` : '-'}</td>
                      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
                        ${m.blogPosts[0] ? `<a href="${m.blogPosts[0].url}" target="_blank" style="font-size:12px">${m.blogPosts[0].title}</a>` : '-'}
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
              <div style="font-size:12px;color:#999;margin-top:8px">총 ${members.length}명</div>
            `;
          });
      }

      function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 2500);
      }

      document.getElementById('secret-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
      });
    </script>
  </body>
</html>
